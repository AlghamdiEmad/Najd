<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Setting | Najd</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="setting-style.css">
    <style>
        /* إضافة تنسيق بسيط لضمان ظهور الصفحة بشكل جيد */
        .settings-page { display: flex; flex-direction: column; gap: 15px; padding: 20px; }
        .save-btn { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="back-link">✕</a>
            <div class="logo">الإعدادات</div>
            <div class="spacer"></div>
        </div>
    </header>
    <main class="settings-page">
        <label>الاسم المستعار</label>
        <input type="text" id="userName">
        <label>لونك المفضل</label>
        <input type="color" id="userColor">
        <button id="mainSaveBtn" class="save-btn">حفظ</button>
    </main>

    <script>
        // دمجنا كل شيء هنا عشان نقطع الشك باليقين
        const nameInput = document.getElementById('userName');
        const colorInput = document.getElementById('userColor');
        const btn = document.getElementById('mainSaveBtn');

        // 1. تحميل البيانات فور فتح الصفحة
        window.addEventListener('load', () => {
            nameInput.value = localStorage.getItem('user_name') || '';
            colorInput.value = localStorage.getItem('user_color') || '#ffffff';
            console.log("تم تحميل البيانات بنجاح");
        });

        // 2. دالة الحفظ
        btn.onclick = function() {
            const name = nameInput.value.trim();
            const color = colorInput.value;

            if (name.length < 2) {
                alert("يرجى كتابة اسم لائق");
                return;
            }

            localStorage.setItem('user_name', name);
            localStorage.setItem('user_color', color);

            alert("تم الحفظ بنجاح! جرب تنشر الآن");
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
