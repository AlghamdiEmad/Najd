<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإعدادات - نجد</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="back-link">✕</a>
            <div class="logo">الإعدادات</div>
            <div class="spacer"></div>
        </div>
    </header>
    <main class="settings-page">
        <label>الاسم المستعار</label>
        <input type="text" id="userName">
        <label>لونك المفضل</label>
        <input type="color" id="userColor">
        <button onclick="saveSettings()" class="save-btn">حفظ</button>
    </main>
    <script>
        document.getElementById('userName').value = localStorage.getItem('user_name') || '';
        document.getElementById('userColor').value = localStorage.getItem('user_color') || '#ffffff';
        function saveSettings() {
            localStorage.setItem('user_name', document.getElementById('userName').value);
            localStorage.setItem('user_color', document.getElementById('userColor').value);
            alert("تم الحفظ");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
