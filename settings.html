<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting | Najd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="setting-style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="back-link-icon">✕</a>
            <div class="logo">الإعدادات</div>
            <div class="header-spacer"></div>
        </div>
    </header>

    <main class="settings-page">
        <div class="settings-container">
            <div class="input-group">
                <label class="field-label">الاسم المستعار</label>
                <input type="text" id="userName" class="main-input">
            </div>

            <div class="input-group">
                <label class="field-label">لونك المفضل</label>
                <input type="color" id="userColor" class="color-picker">
            </div>

            <button id="mainSaveBtn" class="save-btn">حفظ التغييرات</button>
        </div>
    </main>

    <script>
        const nameInput = document.getElementById('userName');
        const colorInput = document.getElementById('userColor');
        const btn = document.getElementById('mainSaveBtn');

        window.addEventListener('load', () => {
            nameInput.value = localStorage.getItem('user_name') || '';
            colorInput.value = localStorage.getItem('user_color') || '#ffffff';
        });

        btn.onclick = function() {
            const name = nameInput.value.trim();
            const color = colorInput.value;

            if (name.length < 2) {
                alert("يرجى كتابة اسم لائق");
                return;
            }

            localStorage.setItem('user_name', name);
            localStorage.setItem('user_color', color);

            alert("تم الحفظ بنجاح!");
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
