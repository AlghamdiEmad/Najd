<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الهوية | نـجـد</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">نـجـد</div>
    </header>

    <div style="margin-top: 100px; padding: 20px; max-width: 500px; margin-left: auto; margin-right: auto;">
        <div class="post-card">
            <h2 style="margin-bottom: 20px; font-size: 1.2rem;">إعدادات الهوية</h2>
            
            <label style="display: block; margin-bottom: 10px; color: var(--text-muted);">اسمك المستعار:</label>
            <input type="text" id="user-name-input" placeholder="مثلاً: صقر نجد" 
                style="width: 100%; background: #0a0a0a; border: var(--border-smooth); border-radius: 12px; color: white; padding: 12px; font-family: var(--font-najd); margin-bottom: 20px; outline: none;">
            
            <label style="display: block; margin-bottom: 10px; color: var(--text-muted);">لون هويتك:</label>
            <input type="color" id="user-color-input" value="#d4af37" 
                style="width: 100%; height: 50px; background: none; border: none; cursor: pointer; margin-bottom: 25px;">
            
            <button id="save-settings-btn" style="width: 100%; background: var(--accent); color: var(--bg-main); border: none; padding: 12px; border-radius: 30px; font-weight: bold; cursor: pointer; font-family: var(--font-najd);">حفظ التغييرات</button>
        </div>

        <center>
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; margin-top: 20px; display: inline-block;">← العودة للرئيسية</a>
        </center>
    </div>

    <script src="settings.js"></script>
</body>
</html>
