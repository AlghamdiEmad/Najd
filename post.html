<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشور جديد | نـجـد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">نـجـد</div>
    </header>

    <div style="margin-top: 100px; padding: 20px; max-width: 500px; margin-left: auto; margin-right: auto;">
        <div class="post-card">
            <h2 style="margin-bottom: 20px; font-size: 1.2rem;">اكتب ما يجول في خاطرك..</h2>
            
            <textarea id="post-content" maxlength="60" placeholder="ماذا يحدث؟" 
                style="width: 100%; height: 120px; background: #0a0a0a; border: var(--border-smooth); border-radius: 12px; color: white; padding: 15px; font-family: var(--font-najd); font-size: 1.1rem; resize: none; outline: none;"></textarea>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <span id="char-count" style="color: var(--text-muted); font-size: 0.9rem;">60 حرف متبقي</span>
                <button id="send-btn" style="background: var(--accent); color: var(--bg-main); border: none; padding: 10px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; font-family: var(--font-najd);">نشر</button>
            </div>
        </div>
        
        <center>
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; margin-top: 20px; display: inline-block;">← العودة للرئيسية</a>
        </center>
    </div>

    <script type="module" src="post.js"></script>
</body>
</html>
