<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najd | New Post</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="post-style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="back-link">إلغاء</a>
            <div class="logo">جديد</div>
            <button onclick="publishPost()" class="publish-btn">نشر</button>
        </div>
    </header>

    <main>
        <textarea id="postText" maxlength="60" placeholder="ماذا يدور في خاطرك؟"></textarea>
        <div id="char-count">60 حرف متبقي</div>
    </main>

    <script src="supabase-config.js"></script>
    <script src="post.js"></script>
    <script>
        const tx = document.getElementById('postText');
        tx.addEventListener('input', () => {
            document.getElementById('char-count').innerText = `${60 - tx.value.length} حرف متبقي`;
        });
    </script>
</body>
</html>
