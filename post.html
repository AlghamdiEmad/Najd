<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Najd | New Post</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="post-style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="back-link">إلغاء</a>
            <div class="logo">جديد</div>
            <button onclick="publishPost()" class="header-publish-btn">نشر</button>
        </div>
    </header>

    <main class="post-container">
        <textarea id="postText" class="post-input-area" maxlength="60" placeholder="ماذا يدور في خاطرك؟"></textarea>
        <div id="char-count" class="char-counter">60 حرف متبقي</div>
        <button onclick="publishPost()" class="publish-btn">نشر الآن</button>
    </main>

    <script src="supabase-config.js"></script>
    <script src="post.js"></script>
    <script>
        const tx = document.getElementById('postText');
        const countDisplay = document.getElementById('char-count');
        
        tx.addEventListener('input', () => {
            const remaining = 60 - tx.value.length;
            countDisplay.innerText = `${remaining} حرف متبقي`;
            if (remaining <= 10) {
                countDisplay.classList.add('limit-reached');
            } else {
                countDisplay.classList.remove('limit-reached');
            }
        });
    </script>
</body>
</html>
